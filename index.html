<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chavez Management Group</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Allura&family=Montserrat:wght@200;300;400;500;600;700&family=Playfair+Display:ital,wght@1,400;1,500&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:       #1e3a5f;
    --navy-deep:  #14283f;
    --navy-edge:  #0d1c2e;
    --ink:        #ffffff;
    --muted:      rgba(255,255,255,.62);
    --soft:       rgba(255,255,255,.85);
    --gold:       #b8a05c;
    --rule:       rgba(255,255,255,.20);
    --shadow:     0 2px 40px rgba(0,0,0,.5);
  }
  *{ box-sizing:border-box; margin:0; padding:0; }
  html,body{ height:100%; }
  body{
    background: var(--navy-edge);
    color: var(--ink);
    font-family:"Montserrat", sans-serif;
    overflow:hidden;
    -webkit-font-smoothing:antialiased;
  }

  /* ---- two-column split ---- */
  .content{
    display:grid;
    grid-template-columns: 42fr 58fr;
    height:100%;
  }

  /* ---- left: photo panel ---- */
  .photo-panel{ position:relative; overflow:hidden; background: var(--navy-deep); }
  .photo-panel img,
  .photo-panel video{
    position:absolute; inset:0;
    width:100%; height:100%; object-fit:cover; object-position:center;
  }
  #bgVideo{ display:none; }
  /* Subtle navy wash on the photo + bottom gradient for caption legibility */
  .photo-panel::after{
    content:""; position:absolute; inset:0;
    background:
      linear-gradient(0deg, rgba(13,28,46,.95) 0%, rgba(13,28,46,0) 38%),
      linear-gradient(180deg, rgba(13,28,46,.55) 0%, rgba(13,28,46,0) 22%),
      linear-gradient(0deg, rgba(30,58,95,.18), rgba(30,58,95,.18));
    pointer-events:none;
  }
  /* Vertical gold accent on the inner edge */
  .photo-panel::before{
    content:""; position:absolute; top:0; bottom:0; right:0;
    width:2px; background: var(--gold);
    z-index:2;
  }
  .photo-caption{
    position:absolute; z-index:3;
    left:0; right:0; bottom:0;
    padding: clamp(28px, 3vw, 56px);
    animation: rise 1s cubic-bezier(.2,.75,.2,1) both .35s;
  }
  .pc-label{
    display:block;
    font-size: clamp(10px,.95vw,14px);
    text-transform:uppercase; letter-spacing:.55em;
    color: var(--gold);
    font-weight:500;
    margin-bottom: .9em;
  }
  .pc-addr{
    display:block;
    font-size: clamp(20px, 1.85vw, 32px);
    line-height: 1.25;
    letter-spacing:.04em;
    color: var(--ink);
    font-weight: 300;
  }

  /* ---- right: info panel ---- */
  .info-panel{
    background:
      radial-gradient(120% 100% at 80% 0%, rgba(30,58,95,.85), rgba(20,40,63,1) 55%, var(--navy-deep) 100%);
    padding: clamp(32px, 3.6vw, 64px);
    display:flex; flex-direction:column;
    gap: clamp(20px, 2.6vw, 44px);
    position:relative;
  }
  .info-panel > *{ animation: rise 1s cubic-bezier(.2,.75,.2,1) both; }
  .info-header { animation-delay:.05s; }
  .info-middle { animation-delay:.18s; }
  .info-footer { animation-delay:.30s; }
  @keyframes rise{ from{opacity:0; transform:translateY(18px);} to{opacity:1; transform:none;} }

  /* header inside info panel */
  .info-header{ display:flex; justify-content:space-between; align-items:flex-start; gap:24px; }
  .logo{ display:flex; align-items:center; gap: clamp(14px, 1.2vw, 20px); }
  .logo-mark{
    width: clamp(48px, 4vw, 70px);
    aspect-ratio:1/1;
    border:1.5px solid var(--ink);
    flex:none;
    position:relative;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  .logo-c{
    font-family:"Allura", cursive;
    font-size: clamp(64px, 5.6vw, 96px);
    line-height:0;
    color: var(--ink);
    pointer-events:none;
  }
  .wordmark{ display:flex; flex-direction:column; line-height:1; }
  .wm-main{
    font-weight:400;
    font-size: clamp(16px, 1.5vw, 26px);
    letter-spacing:.32em;
    text-transform:uppercase;
  }
  .wm-sub{
    margin-top:.55em;
    font-weight:500;
    font-size: clamp(8px,.72vw,11px);
    letter-spacing:.26em;
    color: var(--soft);
    text-transform:uppercase;
  }
  .header-right{ display:flex; flex-direction:column; align-items:flex-end; gap:.7em; }
  .date{
    font-size: clamp(11px,1vw,15px);
    text-transform:uppercase; letter-spacing:.32em;
    color: var(--soft);
  }
  .live{
    display:flex; align-items:center; gap:.7em;
    font-size: clamp(9px,.78vw,12px);
    text-transform:uppercase; letter-spacing:.35em;
    color: var(--muted);
  }
  .dot{
    width:.62em; height:.62em; border-radius:50%; background: var(--gold);
    animation:pulse 2.6s infinite;
  }
  @keyframes pulse{
    0%{ box-shadow:0 0 0 0 rgba(184,160,92,.55); }
    70%{ box-shadow:0 0 0 13px rgba(184,160,92,0); }
    100%{ box-shadow:0 0 0 0 rgba(184,160,92,0); }
  }

  /* middle: huge clock, left-aligned */
  .info-middle{
    flex:1;
    display:flex; flex-direction:column; justify-content:center;
    gap: clamp(16px, 2vw, 32px);
  }
  .clock{
    display:flex; align-items:flex-start; gap:.18em;
    font-variant-numeric: tabular-nums;
    text-shadow: 0 4px 60px rgba(0,0,0,.45);
  }
  .hm{
    font-size: clamp(110px, 17vw, 280px);
    font-weight:200;
    line-height:.82;
    letter-spacing:-.022em;
  }
  .clock .meta{
    display:flex; flex-direction:column; gap:.35em;
    padding-top:.6em;
    font-weight:500;
  }
  .ampm{
    font-size: clamp(20px, 2vw, 36px);
    letter-spacing:.22em;
    color: var(--gold);
  }
  .secs{
    font-size: clamp(20px, 2vw, 36px);
    color: var(--muted);
    font-weight:300;
  }
  .tagline{
    font-size: clamp(11px, 1vw, 16px);
    text-transform:uppercase; letter-spacing:.42em;
    color: var(--soft);
    font-weight:400;
    line-height: 1.6;
  }
  .tagline .gold-rule{
    display:inline-block;
    width: clamp(28px, 4vw, 60px);
    height:1px; background: var(--gold);
    vertical-align:middle;
    margin: 0 1.2em;
    transform:translateY(-2px);
  }

  /* greeting above the clock */
  .greeting{
    font-family:"Playfair Display", serif;
    font-style: italic;
    font-size: clamp(30px, 3.2vw, 54px);
    line-height: 1;
    color: var(--gold);
    font-weight: 400;
    letter-spacing: 0;
    margin-bottom: clamp(-4px, -0.4vw, -10px);
  }

  /* bottom: weather + hours, side by side */
  .info-footer{
    border-top: 1px solid var(--rule);
    padding-top: clamp(18px, 2vw, 32px);
    display:flex; align-items:center;
    gap: clamp(18px, 2vw, 36px);
  }
  .info-footer > .cell{
    display:flex; align-items:center;
    gap: clamp(14px, 1.4vw, 22px);
    flex:1; min-width:0;
  }
  .vsep{
    width:1px; background: var(--rule);
    align-self:stretch;
    flex: none;
  }
  .wx-icon{ color: var(--ink); display:flex; }
  .wx-icon svg{ width: clamp(48px, 4.4vw, 72px); height:auto; }
  .wx-meta{ display:flex; flex-direction:column; line-height:1.15; gap:.18em; min-width:0; }
  .temp{
    font-size: clamp(32px, 3.2vw, 56px);
    font-weight:300;
    letter-spacing:-.01em;
    white-space:nowrap;
  }
  .cond{
    font-size: clamp(11px,1.1vw,16px);
    color: var(--soft);
    text-transform:uppercase; letter-spacing:.22em;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }
  .loc{
    font-size: clamp(9px,.82vw,12px);
    text-transform:uppercase; letter-spacing:.36em;
    color: var(--gold);
    font-weight:500;
  }
  /* "Closed" gets a different accent so it reads at a glance */
  .temp.closed{ color: var(--gold); }

  /* portrait layout: stack vertically */
  @media (max-aspect-ratio: 1/1), (max-width: 720px){
    .content{ grid-template-columns: 1fr; grid-template-rows: 38fr 62fr; }
    .photo-panel::before{ display:none; }
    .photo-panel::after{
      background:
        linear-gradient(0deg, rgba(13,28,46,.95) 0%, rgba(13,28,46,0) 50%),
        linear-gradient(0deg, rgba(30,58,95,.20), rgba(30,58,95,.20));
    }
  }
</style>
</head>
<body>
  <div class="content">
    <div class="photo-panel">
      <img id="bgImage" alt="" />
      <video id="bgVideo" muted loop playsinline></video>
      <div class="photo-caption">
        <span class="pc-label">Welcome</span>
        <span class="pc-addr" id="addr">1860 El Camino Real<br>Burlingame, CA 94010</span>
      </div>
    </div>

    <div class="info-panel">
      <div class="info-header">
        <div class="logo">
          <div class="logo-mark"><span class="logo-c">C</span></div>
          <div class="wordmark">
            <span class="wm-main" id="brandName">Chavez</span>
            <span class="wm-sub" id="brandSub">Management Group, Inc.</span>
          </div>
        </div>
        <div class="header-right">
          <div class="date" id="date">—</div>
          <div class="live"><span class="dot"></span><span>Now</span></div>
        </div>
      </div>

      <div class="info-middle">
        <div class="greeting" id="greeting">Good Morning</div>
        <div class="clock">
          <span class="hm" id="time">--:--</span>
          <div class="meta">
            <span class="ampm" id="ampm">--</span>
            <span class="secs" id="secs">--</span>
          </div>
        </div>
        <div class="tagline" id="tagline">
          Family Owned <span class="gold-rule"></span> Serving Northern California for over 40 years
        </div>
      </div>

      <div class="info-footer">
        <div class="cell">
          <div class="wx-icon" id="wxIcon"></div>
          <div class="wx-meta">
            <span class="temp" id="temp">—</span>
            <span class="cond" id="cond">Loading…</span>
            <span class="loc" id="loc">Burlingame</span>
          </div>
        </div>
        <div class="vsep"></div>
        <div class="cell">
          <div class="wx-meta">
            <span class="temp" id="hoursStatus">Open</span>
            <span class="cond" id="hoursDetail">Until 5:00 PM</span>
            <span class="loc" id="hoursSchedule">Mon–Fri · 9 to 5</span>
          </div>
        </div>
      </div>
    </div>
  </div>

<script>
/* ============================================================
   EDIT THIS BLOCK — same as the other layout files.
   ============================================================ */
const CONFIG = {
  brandMain: "Chavez",
  brandSub:  "Management Group, Inc.",
  tagline:   'Family Owned <span class="gold-rule"></span> Serving Northern California for over 40 years',
  addressLine: "1860 El Camino Real<br>Burlingame, CA 94010",
  imageUrl: "building.jpg",
  videoUrl: "",
  latitude:      37.5841,
  longitude:    -122.3661,
  locationLabel: "Burlingame",
  units:        "fahrenheit",

  // Office hours (24-hour format). Set weekdays as 0=Sun, 1=Mon, ..., 6=Sat
  hours: {
    openHour:  9,            // 9:00 AM
    closeHour: 17,           // 5:00 PM
    openDays:  [1,2,3,4,5],  // Mon–Fri
    schedule:  "Mon–Fri · 9 to 5",
  },
  hour12:      true,
  showSeconds: true,
};
/* ============================================================ */

const ic = {
  sun:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M2 12h2M20 12h2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M19.1 4.9l-1.4 1.4M6.3 17.7l-1.4 1.4"/></svg>`,
  moon:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.8A8.5 8.5 0 1 1 11.2 3a6.5 6.5 0 0 0 9.8 9.8z"/></svg>`,
  cloud:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M7 18a4 4 0 0 1 0-8 5 5 0 0 1 9.6-1.3A3.5 3.5 0 0 1 17 18z"/></svg>`,
  cloudSun:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="8" cy="8" r="3"/><path d="M8 2.6V4M2.6 8H4M4.3 4.3l1 1M11.7 4.3l-1 1M12 8h-.4"/><path d="M9 19a3.2 3.2 0 0 1 .2-6.4 4 4 0 0 1 7.5.9A2.8 2.8 0 0 1 16.5 19z"/></svg>`,
  cloudMoon:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 3.3a4.4 4.4 0 1 0 4.4 6"/><path d="M9 19a3.2 3.2 0 0 1 .2-6.4 4 4 0 0 1 7.5.9A2.8 2.8 0 0 1 16.5 19z"/></svg>`,
  fog:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M7 13a4 4 0 0 1 0-8 5 5 0 0 1 9.6-1.3A3.5 3.5 0 0 1 17 13z"/><path d="M4 17h16M6 20.5h12"/></svg>`,
  rain:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M7 14a4 4 0 0 1 0-8 5 5 0 0 1 9.6-1.3A3.5 3.5 0 0 1 17 14z"/><path d="M8 17.5l-1 2.5M12 17.5l-1 2.5M16 17.5l-1 2.5"/></svg>`,
  snow:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M7 14a4 4 0 0 1 0-8 5 5 0 0 1 9.6-1.3A3.5 3.5 0 0 1 17 14z"/><path d="M8 19h.01M12 20.5h.01M16 19h.01M10 17.5h.01M14 17.5h.01"/></svg>`,
  storm:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M7 14a4 4 0 0 1 0-8 5 5 0 0 1 9.6-1.3A3.5 3.5 0 0 1 17 14z"/><path d="M12.5 14l-2.2 4H13l-2.2 4"/></svg>`,
};
// --- map an NWS icon URL to one of our SVG icons + a clean label ---
// NWS icon URLs look like:  https://api.weather.gov/icons/land/day/few?size=medium
// The path segment we care about is the slug after "day" or "night".
// Slug reference: https://api.weather.gov/icons (skc, few, sct, bkn, ovc, fog, rain, snow, tsra, ...)
function nwsIcon(iconUrl, textDescription){
  let slug = "", isDay = true;
  if(typeof iconUrl === "string"){
    const m = iconUrl.match(/\/(day|night)\/([a-z_]+)/);
    if(m){ isDay = (m[1] === "day"); slug = m[2]; }
  }
  // Strip any percent-chance suffix like "rain,40" — only first slug matters
  slug = slug.split(",")[0];

  // Map slug families to our existing SVG set
  let icon;
  if(slug === "skc" || slug === "hot")                                       icon = isDay ? ic.sun : ic.moon;
  else if(slug === "few" || slug === "sct")                                  icon = isDay ? ic.cloudSun : ic.cloudMoon;
  else if(slug === "bkn" || slug === "ovc" || slug === "cold" || slug === "wind_bkn" || slug === "wind_ovc" || slug === "wind_sct" || slug === "wind_few" || slug === "wind_skc") icon = ic.cloud;
  else if(slug === "fog" || slug === "smoke" || slug === "haze" || slug === "dust")  icon = ic.fog;
  else if(slug.startsWith("rain") || slug.startsWith("shower") || slug === "fzra" || slug === "rain_fzra" || slug === "rain_sleet")  icon = ic.rain;
  else if(slug.startsWith("snow") || slug === "blizzard" || slug === "rain_snow" || slug === "snow_sleet" || slug === "sleet")        icon = ic.snow;
  else if(slug === "tsra" || slug === "tsra_sct" || slug === "tsra_hi" || slug === "tornado" || slug === "hurricane" || slug === "tropical_storm") icon = ic.storm;
  else                                                                         icon = isDay ? ic.cloudSun : ic.cloudMoon;

  // Build a clean Title Case label from NWS textDescription
  let label = (textDescription || "—").trim();
  // Title case (NWS sometimes returns ALL CAPS or sentence case)
  label = label.toLowerCase().replace(/\b\w/g, c => c.toUpperCase());
  return { label, icon };
}
const $ = id => document.getElementById(id);
$("brandName").textContent = CONFIG.brandMain;
$("brandSub").textContent  = CONFIG.brandSub;
$("tagline").innerHTML     = CONFIG.tagline;
$("addr").innerHTML        = CONFIG.addressLine;
$("loc").textContent       = CONFIG.locationLabel;
document.title             = CONFIG.brandMain + " " + CONFIG.brandSub;
(function(){
  const img = $("bgImage"), vid = $("bgVideo");
  if(CONFIG.videoUrl){ vid.src = CONFIG.videoUrl; vid.style.display="block"; img.style.display="none"; vid.play().catch(()=>{}); }
  else if(CONFIG.imageUrl){ img.src = CONFIG.imageUrl; img.onerror = ()=>{ img.style.display="none"; }; }
  else { img.style.display="none"; }
})();
function updateClock(){
  const now = new Date();
  let h = now.getHours();
  const m = String(now.getMinutes()).padStart(2,"0");
  let ampm = "";
  if(CONFIG.hour12){ ampm = h >= 12 ? "PM" : "AM"; h = h % 12; if(h === 0) h = 12; }
  const hh = CONFIG.hour12 ? String(h) : String(h).padStart(2,"0");
  $("time").textContent = hh + ":" + m;
  $("ampm").textContent = ampm;
  $("ampm").style.display = CONFIG.hour12 ? "" : "none";
  $("secs").textContent = String(now.getSeconds()).padStart(2,"0");
  $("secs").style.display = CONFIG.showSeconds ? "" : "none";
  $("date").textContent = now.toLocaleDateString(undefined,{ weekday:"long", month:"long", day:"numeric" });
}

// --- time-aware greeting ---
function updateGreeting(){
  const h = new Date().getHours();
  let g;
  if(h >= 5  && h < 12) g = "Good Morning";
  else if(h >= 12 && h < 17) g = "Good Afternoon";
  else if(h >= 17 && h < 22) g = "Good Evening";
  else                       g = "Welcome";
  $("greeting").textContent = g;
}

// --- office hours: live open / closed status ---
function fmtHour(h){
  const ampm = h >= 12 ? "PM" : "AM";
  let hh = h % 12; if(hh === 0) hh = 12;
  return hh + " " + ampm;
}
function dayName(d){ return ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"][d]; }
function updateHours(){
  const cfg = CONFIG.hours;
  const now = new Date();
  const day = now.getDay();
  const minutesNow = now.getHours()*60 + now.getMinutes();
  const openMin  = cfg.openHour  * 60;
  const closeMin = cfg.closeHour * 60;
  const isOpenDay = cfg.openDays.includes(day);
  const isOpenNow = isOpenDay && minutesNow >= openMin && minutesNow < closeMin;

  const statusEl   = $("hoursStatus");
  const detailEl   = $("hoursDetail");
  const scheduleEl = $("hoursSchedule");

  scheduleEl.textContent = cfg.schedule;

  if(isOpenNow){
    statusEl.textContent = "Open";
    statusEl.classList.remove("closed");
    detailEl.textContent = "Until " + fmtHour(cfg.closeHour);
  } else {
    statusEl.textContent = "Closed";
    statusEl.classList.add("closed");
    // figure out the next open day
    let next = day;
    if(isOpenDay && minutesNow < openMin){
      // closed but opens later today
      detailEl.textContent = "Opens Today at " + fmtHour(cfg.openHour);
      return;
    }
    // otherwise look forward up to 7 days for the next openDay
    for(let i=1; i<=7; i++){
      next = (day + i) % 7;
      if(cfg.openDays.includes(next)){
        const label = (i === 1) ? "Tomorrow" : dayName(next);
        detailEl.textContent = "Opens " + label + " at " + fmtHour(cfg.openHour);
        return;
      }
    }
  }
}
// --- weather via the National Weather Service (api.weather.gov) ---
// Discovery is a 3-step dance: lat/lng -> grid/stations URL -> nearest station id.
// The first two only change if you move the building, so we cache the station id.
let _nwsStationId = null;

async function discoverStation(){
  if(_nwsStationId) return _nwsStationId;
  // 1) /points
  const pts  = await fetch(`https://api.weather.gov/points/${CONFIG.latitude},${CONFIG.longitude}`,
                           { headers: { "Accept": "application/geo+json" } });
  if(!pts.ok) throw new Error("nws points " + pts.status);
  const ptsJson = await pts.json();
  const stationsUrl = ptsJson.properties.observationStations;

  // 2) /gridpoints/.../stations
  const stRes = await fetch(stationsUrl, { headers: { "Accept": "application/geo+json" } });
  if(!stRes.ok) throw new Error("nws stations " + stRes.status);
  const stJson = await stRes.json();
  if(!stJson.features || !stJson.features.length) throw new Error("no stations");
  _nwsStationId = stJson.features[0].properties.stationIdentifier;
  return _nwsStationId;
}

async function updateWeather(){
  try{
    const station = await discoverStation();
    // 3) /stations/{id}/observations/latest
    const obsRes = await fetch(`https://api.weather.gov/stations/${station}/observations/latest`,
                               { headers: { "Accept": "application/geo+json" } });
    if(!obsRes.ok) throw new Error("nws obs " + obsRes.status);
    const p = (await obsRes.json()).properties;

    // Temperature: NWS gives Celsius. Convert per CONFIG.units.
    let tempC = (p.temperature && p.temperature.value !== null) ? p.temperature.value : null;
    // Observation stations occasionally return null (no recent reading). Try the previous obs.
    if(tempC === null){
      const obs2 = await fetch(`https://api.weather.gov/stations/${station}/observations?limit=5`,
                               { headers: { "Accept": "application/geo+json" } });
      if(obs2.ok){
        const list = (await obs2.json()).features || [];
        const fresh = list.find(f => f.properties && f.properties.temperature && f.properties.temperature.value !== null);
        if(fresh){
          tempC = fresh.properties.temperature.value;
          // also reuse this observation for icon/description if the latest was incomplete
          if(!p.icon) p.icon = fresh.properties.icon;
          if(!p.textDescription) p.textDescription = fresh.properties.textDescription;
        }
      }
    }
    if(tempC === null) throw new Error("no temperature available");

    const isF = CONFIG.units === "fahrenheit";
    const displayTemp = isF ? (tempC * 9/5 + 32) : tempC;

    const info = nwsIcon(p.icon, p.textDescription);
    $("temp").textContent  = Math.round(displayTemp) + "°";
    $("wxIcon").innerHTML  = info.icon;
    $("cond").textContent  = info.label;
  }catch(e){
    $("cond").textContent = "Weather Unavailable";
    // Reset station cache so the next attempt re-discovers (in case the station was removed)
    _nwsStationId = null;
  }
}
let cursorTimer;
function nudgeCursor(){
  document.body.style.cursor = "default";
  clearTimeout(cursorTimer);
  cursorTimer = setTimeout(() => document.body.style.cursor = "none", 3000);
}
window.addEventListener("mousemove", nudgeCursor);
nudgeCursor();
updateClock(); setInterval(updateClock, 1000);
updateGreeting(); setInterval(updateGreeting, 60 * 1000);
updateHours();    setInterval(updateHours,    60 * 1000);
updateWeather(); setInterval(updateWeather, 10 * 60 * 1000);
</script>
